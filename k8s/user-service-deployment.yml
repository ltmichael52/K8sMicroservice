apiVersion: apps/v1
kind: Deployment
metadata:
    name: user-service
spec:
    replicas: 3
    selector:
        matchLabels:
            app: user-service
    template:
        metadata:
            labels:
                app: user-service
        spec:
            containers:
                - name: user-service
                  image: lemichael52/user-service:latest
                  ports:
                      - containerPort: 3001
